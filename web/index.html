<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Griffin's Citibike Rides</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: rgba(12, 12, 12, 0.95);
            --elevated: rgba(255, 255, 255, 0.04);
            --hover: rgba(255, 255, 255, 0.06);
            --text: rgba(255, 255, 255, 0.9);
            --text-2: rgba(255, 255, 255, 0.5);
            --text-3: rgba(255, 255, 255, 0.25);
            --border: rgba(255, 255, 255, 0.06);
            --sidebar: 320px;
            --sheet-peek: 140px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        #map { width: 100%; height: 100vh; height: 100dvh; }

        /* ── Sheet handle (mobile only) ── */
        .sheet-handle {
            display: none;
            justify-content: center;
            padding: 12px 0 8px;
            cursor: pointer;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .sheet-handle-bar {
            width: 36px; height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.25);
        }

        /* ── Sidebar (desktop) ── */
        .sidebar {
            position: absolute; top: 0; left: 0; z-index: 1000;
            width: var(--sidebar); height: 100vh;
            background: var(--surface);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar))); }

        .sidebar-toggle {
            position: absolute; top: 16px; z-index: 1001;
            left: var(--sidebar);
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-2); padding: 8px 10px; cursor: pointer;
            border-radius: 0 8px 8px 0; font-size: 14px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.2s;
        }
        .sidebar-toggle:hover { color: var(--text); }
        .sidebar.collapsed + .sidebar-toggle { left: 0; }

        /* ── Header ── */
        .header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: flex-start;
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
        .header .subtitle { font-size: 12px; color: var(--text-2); margin-top: 2px; }
        .icon-btn {
            width: 30px; height: 30px; border-radius: 7px;
            background: var(--elevated); border: 1px solid var(--border);
            color: var(--text-2); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: all 0.2s; flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .icon-btn:hover { background: var(--hover); color: var(--text); }

        /* ── Stats ── */
        .stats {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .stat {
            background: var(--elevated); border-radius: 8px;
            padding: 8px 10px; text-align: center;
        }
        .stat-value { font-size: 18px; font-weight: 700; color: #fff; }
        .stat-label {
            font-size: 9px; color: var(--text-3);
            text-transform: uppercase; letter-spacing: 0.8px; margin-top: 1px;
        }

        /* ── Filters ── */
        .filters {
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .filter-btn {
            display: inline-block; padding: 4px 11px; margin: 2px;
            background: var(--elevated); border: 1px solid var(--border);
            border-radius: 14px; color: var(--text-2);
            font-size: 12px; cursor: pointer;
            transition: all 0.2s; font-weight: 500;
            -webkit-tap-highlight-color: transparent;
        }
        .filter-btn:hover {
            background: rgba(74, 0, 224, 0.15);
            border-color: rgba(74, 0, 224, 0.3);
            color: var(--text);
        }
        .filter-btn.active {
            background: linear-gradient(135deg, rgba(230, 50, 20, 0.3), rgba(250, 50, 160, 0.2));
            border-color: rgba(250, 50, 160, 0.4);
            color: #fff;
        }

        /* ── Ride list ── */
        .ride-list {
            flex: 1; overflow-y: auto; position: relative;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .ride-list::-webkit-scrollbar { width: 4px; }
        .ride-list::-webkit-scrollbar-track { background: transparent; }
        .ride-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
        .ride-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

        .ride-item {
            padding: 8px 16px 8px 13px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.15s;
            display: flex; flex-direction: column; justify-content: center;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        .ride-item:hover { background: var(--hover); }
        .ride-item.active { background: rgba(255, 102, 0, 0.08); }
        .ride-date {
            font-size: 10px; color: var(--text-3);
            margin-bottom: 3px; font-weight: 500; letter-spacing: 0.2px;
        }
        .ride-route { font-size: 12px; line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ride-route .station { color: var(--text); }
        .ride-route .arrow { margin: 0 4px; font-weight: 700; }

        /* ── Legend ── */
        .legend {
            position: absolute; bottom: 24px; right: 16px; z-index: 1000;
            background: rgba(10, 10, 10, 0.85);
            padding: 10px 14px; border-radius: 10px;
            border: 1px solid var(--border);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        }
        .legend-title {
            font-size: 9px; color: var(--text-3);
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
        }
        .legend-gradient {
            width: 140px; height: 8px; border-radius: 4px;
            background: linear-gradient(to right, #320800, #8c1900, #c8230a, #e6233c, #f52d8c, #ff8c32, #ffdc78);
        }
        .legend-labels {
            display: flex; justify-content: space-between;
            font-size: 9px; color: var(--text-2); margin-top: 4px;
        }

        /* ── Map controls ── */
        .map-ctrls {
            position: absolute; top: 96px; right: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 4px;
        }
        .map-btn {
            width: 30px; height: 30px; border-radius: 4px;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid var(--border);
            color: var(--text-2); cursor: pointer;
            font-size: 11px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .map-btn:hover { color: var(--text); background: rgba(20,20,20,0.9); }
        .map-btn svg { pointer-events: none; }

        /* ── MapLibre overrides ── */
        .maplibregl-ctrl-group {
            background: rgba(10, 10, 10, 0.85) !important;
            border: 1px solid var(--border) !important;
            border-radius: 4px !important;
            box-shadow: none !important;
        }
        .maplibregl-ctrl-group button {
            width: 30px !important; height: 30px !important;
        }
        .maplibregl-ctrl-group button + button {
            border-top: 1px solid var(--border) !important;
        }
        .maplibregl-ctrl-group button .maplibregl-ctrl-icon {
            filter: invert(1) opacity(0.5);
        }
        .maplibregl-ctrl-group button:hover .maplibregl-ctrl-icon {
            filter: invert(1) opacity(0.8);
        }
        .maplibregl-ctrl-attrib {
            background: rgba(0,0,0,0.5) !important;
        }
        .maplibregl-ctrl-attrib,
        .maplibregl-ctrl-attrib a {
            color: rgba(255,255,255,0.3) !important;
            font-size: 10px !important;
        }

        /* ════════════════════════════════════════════
           Mobile: sidebar → bottom sheet
           ════════════════════════════════════════════ */
        @media (max-width: 768px) {
            :root { --sheet-peek: 220px; }

            .sidebar {
                top: auto; bottom: 0; left: 0; right: 0;
                width: 100%; height: 80dvh;
                border-right: none;
                border-top: 1px solid var(--border);
                border-radius: 16px 16px 0 0;
                transform: translateY(calc(100% - var(--sheet-peek)));
                box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.5);
            }
            .sidebar.collapsed {
                transform: translateY(calc(100% - var(--sheet-peek)));
            }
            .sidebar.expanded {
                transform: translateY(0);
            }

            .sidebar-toggle { display: none; }
            .sheet-handle { display: flex; }

            .header { padding: 4px 16px 10px; }
            .header h1 { font-size: 16px; }

            .stats { padding: 8px 16px; gap: 4px; }
            .stat { padding: 6px 4px; }
            .stat-value { font-size: 15px; }
            .stat-label { font-size: 8px; }

            .filters { padding: 8px 16px; }

            .ride-list {
                padding-bottom: env(safe-area-inset-bottom, 0px);
            }

            .legend {
                bottom: calc(var(--sheet-peek) + 12px);
                right: 10px;
            }

            .map-ctrls {
                top: 10px;
                right: auto;
                left: 10px;
            }

            .maplibregl-ctrl-top-right {
                top: 10px !important;
                right: 10px !important;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sheet-handle" id="sheet-handle"><div class="sheet-handle-bar"></div></div>
        <div class="header">
            <div>
                <h1>Citibike Rides</h1>
                <div class="subtitle">NYC ride archive</div>
            </div>
            <button class="icon-btn" onclick="closeSidebar()" title="Close">&times;</button>
        </div>
        <div class="stats" id="stats"></div>
        <div class="filters">
            <div id="year-filters"></div>
        </div>
        <div class="ride-list" id="ride-list"></div>
    </div>
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>

    <div id="map"></div>

    <div class="map-ctrls">
        <button class="map-btn" id="anim-toggle" onclick="toggleAnimation()" title="Toggle animation">
            <svg width="10" height="12" viewBox="0 0 10 12"><rect x="0" y="0" width="3" height="12" fill="currentColor"/><rect x="7" y="0" width="3" height="12" fill="currentColor"/></svg>
        </button>
        <button class="map-btn" onclick="resetView()" title="Reset view">&#x21BA;</button>
    </div>

    <div class="legend">
        <div class="legend-title">Ride frequency</div>
        <div class="legend-gradient"></div>
        <div class="legend-labels">
            <span>Rare</span>
            <span>Frequent</span>
        </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/deck.gl@9/dist.min.js"></script>
    <script src="https://unpkg.com/@mapbox/polyline@1.2.1/src/polyline.js"></script>
    <script src="app.js"></script>
</body>
</html>
