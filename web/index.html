<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin's Citibike Rides</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; }
        #map { width: 100%; height: 100vh; }

        .sidebar {
            position: absolute; top: 0; left: 0; z-index: 1000;
            width: 340px; height: 100vh; background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto; transition: transform 0.3s ease;
        }
        .sidebar.collapsed { transform: translateX(-340px); }

        .sidebar-toggle {
            position: absolute; top: 16px; z-index: 1001;
            left: 340px; background: rgba(10,10,10,0.9); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 8px 12px; cursor: pointer; border-radius: 0 8px 8px 0;
            font-size: 16px; transition: left 0.3s ease;
        }
        .sidebar.collapsed + .sidebar-toggle { left: 0; }

        .header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .header .subtitle { font-size: 13px; color: rgba(255,255,255,0.5); }

        .stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .stat { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px; }
        .stat-value { font-size: 24px; font-weight: 700; color: #3b82f6; }
        .stat-label { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .filters {
            padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .filters h3 { font-size: 13px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .filter-btn {
            display: inline-block; padding: 6px 12px; margin: 3px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; color: #fff; font-size: 12px; cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active { background: #3b82f6; border-color: #3b82f6; }

        .ride-list { padding: 8px 0; }
        .ride-item {
            padding: 12px 20px; cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.2s;
        }
        .ride-item:hover { background: rgba(255,255,255,0.05); }
        .ride-item.active { background: rgba(59, 130, 246, 0.15); border-left: 3px solid #3b82f6; }
        .ride-date { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
        .ride-stations { font-size: 13px; line-height: 1.4; }
        .ride-stations .arrow { color: #3b82f6; margin: 0 6px; }
        .ride-bike { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 3px; }

        .share-banner {
            padding: 16px 20px; background: rgba(59, 130, 246, 0.1);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .share-btn {
            width: 100%; padding: 10px; background: #3b82f6; color: #fff;
            border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .share-btn:hover { background: #2563eb; }

        /* Custom markers */
        .start-marker {
            background: #22c55e; width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 0 6px rgba(34,197,94,0.5);
        }
        .end-marker {
            background: #ef4444; width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 0 6px rgba(239,68,68,0.5);
        }

        .leaflet-popup-content-wrapper {
            background: rgba(20, 20, 20, 0.95) !important; color: #fff !important;
            border-radius: 10px !important; border: 1px solid rgba(255,255,255,0.1) !important;
        }
        .leaflet-popup-tip { background: rgba(20, 20, 20, 0.95) !important; }
        .leaflet-popup-content { font-family: -apple-system, sans-serif !important; font-size: 13px !important; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="header">
            <h1>Griffin's Citibike Rides</h1>
            <div class="subtitle">NYC bike ride archive</div>
        </div>
        <div class="stats" id="stats"></div>
        <div class="filters">
            <h3>Filter by year</h3>
            <div id="year-filters"></div>
        </div>
        <div class="share-banner">
            <button class="share-btn" onclick="shareMap()">Share This Map</button>
        </div>
        <div class="ride-list" id="ride-list"></div>
    </div>
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@mapbox/polyline@1.2.1/src/polyline.js"></script>
    <script src="app.js"></script>
</body>
</html>
